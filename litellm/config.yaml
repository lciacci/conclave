# LiteLLM gateway — v2 REFERENCE. The live config is generated on the instance
# by user-data from the Terraform `models` var (single source of truth), so this
# file documents the shape; edit infra/variables.tf `models` to change the fleet.
#
# One OpenAI-compatible API in front of the co-resident vLLM backends + the seam
# for per-model cost accounting. Reachable at <tailscale-ip>:4000. Backends are
# on localhost:<port> (LiteLLM runs --network host on the same box).

model_list:
  # code specialist — Qwen lineage. input/output_cost_per_token are GPU-
  # amortization placeholders (self-hosted has no API cost) so LiteLLM attributes
  # per-model spend; calibrate against measured throughput. See infra models var.
  - model_name: coder
    litellm_params:
      model: openai/coder
      api_base: http://localhost:8001/v1
      api_key: "none"          # vLLM has no auth; Tailscale ACL is the boundary
      input_cost_per_token: 0.00000040
      output_cost_per_token: 0.00000040
  # reasoning specialist — Qwen lineage (R1-Distill-Qwen-7B; the Llama distill
  # garbles under vLLM 0.24's V1 detokenizer, so v2 uses Qwen — see design.md).
  - model_name: reasoning
    litellm_params:
      model: openai/reasoning
      api_base: http://localhost:8002/v1
      api_key: "none"
      input_cost_per_token: 0.00000020
      output_cost_per_token: 0.00000020
  # general — Google lineage (Gemma, HF-gated → token in SSM)
  - model_name: general
    litellm_params:
      model: openai/general
      api_base: http://localhost:8003/v1
      api_key: "none"
      input_cost_per_token: 0.00000030
      output_cost_per_token: 0.00000030

litellm_settings:
  # Per-model cost accounting (v2 goal): logs each call's model + tokens + cost
  # to the litellm container (docker logs litellm). Full persistence = add a
  # Postgres backend; single-user v2 uses stdout logging to learn the pattern.
  success_callback: ["logging"]
  drop_params: true

# ponytail: no router/fallback/rate-limit yet — single box, single user. The
# ensemble fan-out + judge that consume these three model_names arrive in v3.
